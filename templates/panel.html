<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Panel de Gastos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ============================= */
/* ESTILO GENERAL */
/* ============================= */
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
}

header {
    background: linear-gradient(90deg, #0066cc, #004a99);
    color: white;
    padding: 12px 20px;
    text-align: center;
}

/* ============================= */
/* CONTENEDOR */
/* ============================= */
.container {
    padding: 20px;
}

/* ============================= */
/* TABS */
/* ============================= */
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.tab-btn {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #e0e0e0;
    color: #333;
    font-weight: bold;
}

.tab-btn.active {
    background: #0066cc;
    color: white;
}

/* ============================= */
/* TARJETAS */
/* ============================= */
.card {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
}

/* ============================= */
/* TABLAS */
/* ============================= */

.table-wrap {
    max-height: 60vh;
    overflow-y: auto;
    padding-right: 5px; /* para que el scroll no tape columnas */
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    table-layout: fixed;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
    text-align: center;
}

tr:hover { background: #f1f1f1; }

/* ============================= */
/* BOTONES */
/* ============================= */
button {
    padding: 10px 15px;
    border: none;
    background: #0066cc;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0053a3;
}

button.danger {
    background: #c62828;
}

button.danger:hover {
    background: #9a2121;
}

/* ============================= */
/* MODALES */
/* ============================= */
.modal-bg {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}

.modal {
    background:white;
    width:90%;
    max-width:420px;
    margin:100px auto;
    padding:20px;
    border-radius:8px;
}

.modal input, .modal select {
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

/* ============================= */
/* GRÁFICOS */
/* ============================= */

#pieChart {
    max-width: 500px;
    max-height: 500px;
    margin: 0 auto;
}


#barMensual, #lineDiario {
    width: 100%;
    max-height: 180px;    /* ↓ antes 260 */
    height: 180px !important;
}


</style>
</head>

<body>

<header>
  <h1>Mis Gastos</h1>
  <p style="font-size:1.8rem; font-weight:bold; margin:10px 0;">
    Total mes: <span id="total_mes" style="font-size:2.2rem;">0.00</span> €
  </p>
</header>

<div class="container">

  <!-- ============================ -->
  <!-- TABS -->
  <!-- ============================ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('general')">GENERAL</button>
    <button class="tab-btn" onclick="openTab('graficos')">GRÁFICOS</button>
    <button class="tab-btn" onclick="openTab('resumen')">RESUMEN</button>

    <button style="margin-left:auto;" onclick="abrirModalFiltros()">Filtros 🔍</button>
    <button class="danger" onclick="resetFiltros()">Reset filtros ⛔</button>
  </div>

  <!-- ============================ -->
  <!-- TAB GENERAL -->
  <!-- ============================ -->
  <div id="tab-general" class="tab-content">

    <div class="card">
      <h2>Movimientos</h2>
      <button onclick="abrirModalNuevo()" style="margin-bottom:10px;">Añadir gasto</button>

      <div class="table-wrap">
        <table id="tabla"></table>
      </div>
    </div>

  </div>

  <!-- ============================ -->
  <!-- TAB GRÁFICOS -->
  <!-- ============================ -->
  <div id="tab-graficos" class="tab-content" style="display:none;">

    <div class="card">
      <h2>Gasto por Categoría</h2>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
      <h2>Gasto mensual</h2>
      <canvas id="barMensual"></canvas>
    </div>

    <div class="card">
      <h2>Gasto diario</h2>
      <canvas id="lineDiario"></canvas>
    </div>

  </div>

  <!-- ============================ -->
  <!-- TAB RESUMEN -->
  <!-- ============================ -->
  <div id="tab-resumen" class="tab-content" style="display:none;">

    <div class="card">
      <h2>Resumen del período</h2>
      <p><strong>Total seleccionado:</strong> €<span id="res_total"></span></p>
      <p><strong>Día con más gasto:</strong> <span id="res_max_dia"></span></p>
      <p><strong>Media diaria:</strong> €<span id="res_media"></span></p>
      <p><strong>Categoría principal:</strong> <span id="res_cat_top"></span></p>
    </div>

  </div>

</div>

<!-- ============================ -->
<!-- MODAL FILTROS -->
<!-- ============================ -->
<div class="modal-bg" id="modal-filtros">
  <div class="modal">
    <h3>Filtros</h3>

    <label>Categoría:</label>
    <select id="f_categoria">
      <option value="">(Todas)</option>
      <option value="Supermercado">Supermercado</option>
      <option value="Restauración">Restauración</option>
      <option value="Gasolina">Gasolina</option>
      <option value="Otros">Otros</option>
    </select>

    <label>Comercio contiene:</label>
    <input id="f_comercio" placeholder="Ej: merc, gas, bar...">

    <label>Fecha:</label>
    <select id="f_fecha_rango" onchange="toggleFechaPersonalizada()">
      <option value="">(Sin filtro)</option>
      <option value="mes_actual">Este mes</option>
      <option value="mes_pasado">Mes pasado</option>
      <option value="30_dias">Últimos 30 días</option>
      <option value="personalizado">Personalizado</option>
    </select>

    <div id="fecha_personalizada" style="display:none;">
      <input id="f_desde" type="date">
      <input id="f_hasta" type="date">
    </div>

    <button onclick="aplicarFiltros()">Aplicar</button>
    <button class="danger" onclick="cerrarModalFiltros()">Cerrar</button>
  </div>
</div>

<!-- ============================ -->
<!-- MODAL EDITAR -->
<!-- ============================ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Editar gasto</h3>

    <input id="edit_nombre" placeholder="Nombre comercio">
    <input id="edit_valor" type="number" step="0.01" placeholder="Importe total">
    <input id="edit_mi_parte" type="number" step="0.01" placeholder="Mi parte">

    <select id="edit_categoria">
      <option value="Supermercado">Supermercado</option>
      <option value="Restauración">Restauración</option>
      <option value="Gasolina">Gasolina</option>
      <option value="Otros">Otros</option>
    </select>

    <button onclick="guardarEdicion()">Guardar</button>
    <button class="danger" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<!-- ============================ -->
<!-- MODAL NUEVO -->
<!-- ============================ -->
<div class="modal-bg" id="modal-nuevo-bg">
  <div class="modal">
    <h3>Añadir gasto</h3>

    <input id="nuevo_nombre" placeholder="Nombre comercio">
    <input id="nuevo_valor" type="number" step="0.01" placeholder="Importe total">

    <select id="nuevo_categoria">
      <option value="">(Automática)</option>
      <option value="Supermercado">Supermercado</option>
      <option value="Restauración">Restauración</option>
      <option value="Gasolina">Gasolina</option>
      <option value="Otros">Otros</option>
    </select>

    <button onclick="guardarNuevo()">Guardar</button>
    <button class="danger" onclick="cerrarModalNuevo()">Cancelar</button>
  </div>
</div>

<!-- ============================ -->
<!-- SCRIPT PRINCIPAL -->
<!-- ============================ -->
<script>
/* ======== ESTADO GLOBAL ======== */
let gastosGlobal = [];
let editId = null;

let pieChartInstance = null;
let barMensualInstance = null;
let lineDiarioInstance = null;

let lastData = null;

let currentFilters = {
  categoria: "",
  comercio: "",
  desde: "",
  hasta: "",
  rango: ""
};

/* ======== TABS ======== */
function openTab(tab) {
  const tabs = ["general", "graficos", "resumen"];
  tabs.forEach(t => {
    document.getElementById(`tab-${t}`).style.display =
      t === tab ? "block" : "none";
  });

  const btns = document.querySelectorAll(".tab-btn");
  btns.forEach(b => b.classList.remove("active"));

  const idx = { general: 0, graficos: 1, resumen: 2 }[tab];
  btns[idx].classList.add("active");

  if (tab === "graficos" && lastData) {
    generarPie(lastData.categorias || {});
    generarBarMensual(lastData.mensual || {});
    generarLineaDiario(lastData.diario || {});
  }
}

/* ======== MODALES FILTROS ======== */
function abrirModalFiltros() {
  document.getElementById("modal-filtros").style.display = "block";
  document.getElementById("f_categoria").value = currentFilters.categoria;
  document.getElementById("f_comercio").value = currentFilters.comercio;
  document.getElementById("f_fecha_rango").value = currentFilters.rango;
  document.getElementById("f_desde").value = currentFilters.desde;
  document.getElementById("f_hasta").value = currentFilters.hasta;
  toggleFechaPersonalizada();
}

function cerrarModalFiltros() {
  document.getElementById("modal-filtros").style.display = "none";
}

function toggleFechaPersonalizada() {
  const rango = document.getElementById("f_fecha_rango").value;
  document.getElementById("fecha_personalizada").style.display =
    rango === "personalizado" ? "block" : "none";
}

function toISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function monthStart(d) {
  return new Date(d.getFullYear(), d.getMonth(), 1);
}

function prevMonthRange() {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const last = new Date(now.getFullYear(), now.getMonth(), 0);
  return { desde: toISODate(first), hasta: toISODate(last) };
}

async function aplicarFiltros() {
  const categoria = document.getElementById("f_categoria").value;
  const comercio = document.getElementById("f_comercio").value.trim();
  const rango = document.getElementById("f_fecha_rango").value;

  let desde = "";
  let hasta = "";
  const hoy = new Date();

  if (rango === "mes_actual") {
    desde = toISODate(monthStart(hoy));
    hasta = toISODate(hoy);
  } else if (rango === "mes_pasado") {
    const r = prevMonthRange();
    desde = r.desde;
    hasta = r.hasta;
  } else if (rango === "30_dias") {
    const d = new Date(hoy.getTime() - 29 * 24 * 3600 * 1000);
    desde = toISODate(d);
    hasta = toISODate(hoy);
  } else if (rango === "personalizado") {
    desde = document.getElementById("f_desde").value;
    hasta = document.getElementById("f_hasta").value;
  }

  currentFilters = { categoria, comercio, desde, hasta, rango };
  cerrarModalFiltros();
  await cargarDatos();
}

/* RESET FILTROS */
function resetFiltros() {
  currentFilters = { categoria: "", comercio: "", desde: "", hasta: "", rango: "" };
  cargarDatos();
}

/* ======== MODALES NUEVO/EDITAR ======== */

function abrirModalNuevo() {
  document.getElementById("nuevo_nombre").value = "";
  document.getElementById("nuevo_valor").value = "";
  document.getElementById("nuevo_categoria").value = "";
  document.getElementById("modal-nuevo-bg").style.display = "block";
}

function cerrarModalNuevo() {
  document.getElementById("modal-nuevo-bg").style.display = "none";
}

function cerrarModal() {
  document.getElementById("modal-bg").style.display = "none";
}

function editar(id) {
  const g = gastosGlobal.find(x => x.id === id);
  if (!g) return;

  editId = id;
  document.getElementById("edit_nombre").value = g.nombre_comercio;
  document.getElementById("edit_valor").value = g.valor;
  document.getElementById("edit_mi_parte").value = g.mi_parte ?? g.valor;
  document.getElementById("edit_categoria").value = g.categoria;

  document.getElementById("modal-bg").style.display = "block";
}

async function guardarNuevo() {
  const nombre = document.getElementById("nuevo_nombre").value.trim();
  const valor = parseFloat(document.getElementById("nuevo_valor").value);
  const categoria = document.getElementById("nuevo_categoria").value || null;

  if (!nombre || isNaN(valor)) {
    alert("Introduce nombre y valor");
    return;
  }

  await fetch("/gastos/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre_comercio: nombre,
      valor,
      mi_parte: valor,
      categoria
    })
  });

  cerrarModalNuevo();
  await cargarDatos();
}

async function guardarEdicion() {
  const nombre = document.getElementById("edit_nombre").value;
  const valor = parseFloat(document.getElementById("edit_valor").value);
  const mi_parte = document.getElementById("edit_mi_parte").value;
  const categoria = document.getElementById("edit_categoria").value;

  await fetch("/gastos/edit/" + editId, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre_comercio: nombre,
      valor,
      mi_parte: mi_parte ? parseFloat(mi_parte) : null,
      categoria
    })
  });

  cerrarModal();
  await cargarDatos();
}

async function eliminar(id, nombre) {
  if (!confirm("¿Eliminar gasto " + nombre + "?")) return;
  await fetch("/gastos/delete/" + id, { method: "POST" });
  await cargarDatos();
}

/* ======== CARGA DE DATOS ======== */

function buildDashboardUrl() {
  const params = new URLSearchParams();

  if (currentFilters.categoria) params.set("categoria", currentFilters.categoria);
  if (currentFilters.comercio) params.set("comercio", currentFilters.comercio);
  if (currentFilters.desde) params.set("desde", currentFilters.desde);
  if (currentFilters.hasta) params.set("hasta", currentFilters.hasta);

  const p = params.toString();
  return "/dashboard-data" + (p ? "?" + p : "");
}

async function cargarDatos() {
  const url = buildDashboardUrl();
  const r = await fetch(url);
  const data = await r.json();
  lastData = data;

  gastosGlobal = data.gastos ?? [];
  document.getElementById("total_mes").innerText =
    (data.total_mes ?? 0).toFixed(2);

  llenarTabla();
  generarPie(data.categorias || {});
  generarBarMensual(data.mensual || {});
  generarLineaDiario(data.diario || {});
  actualizarResumen(data);
}

/* ======== TABLA ======== */
function llenarTabla() {
  const tabla = document.getElementById("tabla");

  tabla.innerHTML = `
    <tr>
      <th>Comercio</th>
      <th>Categoría</th>
      <th>Total</th>
      <th>Mi parte</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr>
  `;

  gastosGlobal.forEach(g => {
    const mi = g.mi_parte ?? g.valor;

    tabla.innerHTML += `
      <tr>
        <td>${g.nombre_comercio}</td>
        <td>${g.categoria}</td>
        <td>€${Number(g.valor).toFixed(2)}</td>
        <td><strong>€${Number(mi).toFixed(2)}</strong></td>
        <td>${g.created_at}</td>
        <td>
          <button onclick="editar(${g.id})">Editar</button>
          <button class="danger" onclick="eliminar(${g.id}, '${g.nombre_comercio}')">X</button>
        </td>
      </tr>
    `;
  });
}

/* ======== GRÁFICOS ======== */
function generarPie(categorias) {
  const ctx = document.getElementById("pieChart");

  if (pieChartInstance) pieChartInstance.destroy();

  pieChartInstance = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(categorias),
      datasets: [{
        data: Object.values(categorias),
        backgroundColor: [
          "#0066cc","#00aa00","#cc6600","#999999","#9933cc","#ff9900"
        ]
      }]
    }
  });
}

function generarBarMensual(m) {
  const ctx = document.getElementById("barMensual");
  if (barMensualInstance) barMensualInstance.destroy();

  barMensualInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"],
      datasets: [{
        label: "Gasto mensual (mi parte)",
        data: Array.from({length:12},(_,i)=>m[i+1]||0),
        backgroundColor: "#0066cc"
      }]
    },
    options: { scales: { y: { beginAtZero:true } } }
  });
}

function generarLineaDiario(d) {
  const ctx = document.getElementById("lineDiario");
  if (lineDiarioInstance) lineDiarioInstance.destroy();

  const dias = Object.keys(d).map(Number).sort((a,b)=>a-b);

  lineDiarioInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: dias,
      datasets: [{
        label: "Gasto diario (mi parte)",
        data: dias.map(x=>d[x]),
        borderColor: "#00aa00",
        backgroundColor: "rgba(0,170,0,0.2)",
        pointRadius: 3,
      }]
    },
    options: { scales: { y: { beginAtZero:true } } }
  });
}

/* ======== KPIs ======== */
function actualizarResumen(data) {
  const gastos = data.gastos || [];

  const total = gastos.reduce(
    (sum, g) => sum + (g.mi_parte ?? g.valor ?? 0),
    0
  );
  document.getElementById("res_total").innerText = total.toFixed(2);

  const diario = data.diario || {};
  let maxDia = "-", maxVal = 0;

  for (const d in diario) {
    if (diario[d] > maxVal) {
      maxVal = diario[d];
      maxDia = d;
    }
  }

  document.getElementById("res_max_dia").innerText =
    maxDia === "-" ? "-" : `${maxDia} (€${maxVal.toFixed(2)})`;

  const diasConGasto = Object.keys(diario).length || 1;
  document.getElementById("res_media").innerText =
    (total / diasConGasto).toFixed(2);

  let topCat = "-";
  let topVal = 0;

  for (const cat in data.categorias || {}) {
    if (data.categorias[cat] > topVal) {
      topVal = data.categorias[cat];
      topCat = cat;
    }
  }

  document.getElementById("res_cat_top").innerText =
    topCat === "-" ? "-" : `${topCat} (€${topVal.toFixed(2)})`;
}

/* ======== INICIO ======== */
openTab("general");
cargarDatos();

</script>

</body>
</html>
